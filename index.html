<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Art Commissions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/CherryVali.png">

<body>
    <header>
        <h1>Commission Portfolio <br>By Cherry Vali</h1>
        <p>รวมผลงานคอมมิชชั่นที่ผ่านมา</p>
    </header>

    <!-- ส่วนแสดงรูปภาพผลงาน -->
    <main class="gallery">
        <!-- เปลี่ยน URL ตรง src และ onclick ให้เป็นรูปของคุณ -->
        <div class="gallery-item">
            <img src="images/cms_01.png" alt="Commission [1]" onclick="openModal(this.src)">
        </div>

    <!-- หน้าต่างป็อปอัปสำหรับขยายรูป (Lightbox) -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="expandedImg">
    </div>

    <script src="script.js"></script>
